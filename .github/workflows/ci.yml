name: ci

# Runs the local docker-compose e2e on every push/PR — builds the image, starts
# MySQL + the app, and exercises the REST API. No Cloudron needed (GitHub runners
# are amd64, so cloudron/base runs natively here, unlike on Apple Silicon).

on:
  push:
  pull_request:

jobs:
  e2e-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install test deps
        working-directory: test
        run: npm install
      - name: Run local e2e (docker compose)
        working-directory: test
        run: npm run test:local
